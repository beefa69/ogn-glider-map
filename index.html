<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OGN Live Glider Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:     #0a1628;
      --panel:   #0d1f3c;
      --border:  #1a3a6e;
      --accent:  #00d4ff;
      --climb:   #00ff88;
      --sink:    #ff4d6d;
      --neutral: #ffd700;
      --text:    #c8e0ff;
      --mono:    'Share Tech Mono', monospace;
      --sans:    'Barlow', sans-serif;
    }

    html, body { height: 100%; background: var(--sky); color: var(--text); font-family: var(--sans); }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 16px;
      padding: 10px 18px;
      background: linear-gradient(90deg, var(--sky) 0%, #0d2040 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    #header h1 { font-family: var(--mono); font-size: 1rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
    #header h1 span { color: #fff; }
    #status { font-family: var(--mono); font-size: 0.78rem; color: var(--text); opacity: 0.7; margin-left: auto; white-space: nowrap; }
    #count-badge { background: var(--accent); color: var(--sky); font-family: var(--mono); font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

    #live-dot { width: 8px; height: 8px; background: var(--climb); border-radius: 50%; flex-shrink: 0; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }
    #live-dot.error { background: var(--sink); animation: none; }

    /* ── Map ── */
    #map { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; }
    .leaflet-tile { filter: brightness(0.85) saturate(0.8); }
    .satellite-mode .leaflet-tile { filter: none !important; }
    /* Weather overlay — screen blend makes colours vivid on the dark map */
    .weather-layer .leaflet-tile {
      filter: saturate(2.5) contrast(1.3) !important;
      mix-blend-mode: screen;
    }

    /* ── Weather controls ── */
    #weather-controls {
      position: fixed;
      top: 60px; left: 12px;
      z-index: 950;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: rgba(10, 22, 40, 0.98);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      min-width: 160px;
    }

    #wx-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    #wx-header-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }
    #wx-chevron {
      font-size: 0.7rem;
      color: var(--accent);
      transition: transform 0.25s;
    }
    #wx-chevron.collapsed { transform: rotate(-90deg); }

    #wx-body {
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
      max-height: 400px;
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #wx-body.collapsed { max-height: 0; }

    .wx-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(26,58,110,0.4);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      user-select: none;
      width: 100%;
      text-align: left;
    }
    .wx-btn:hover { background: rgba(0,212,255,0.07); }
    .wx-btn.active { background: rgba(0,212,255,0.12); color: var(--accent); }
    .wx-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .wx-opacity-row {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text);
    }
    .wx-opacity-row input[type=range] {
      flex: 1; height: 3px; accent-color: var(--accent); cursor: pointer;
    }
    #wx-opacity-val { min-width: 32px; text-align: right; color: var(--accent); }

    /* ── Legend ── */
    #wx-legend {
      position: fixed;
      bottom: 36px; left: 12px;
      z-index: 950;
      background: rgba(10, 22, 40, 0.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text);
      backdrop-filter: blur(6px);
      display: none;
      min-width: 180px;
    }
    #wx-legend.visible { display: block; }
    #wx-legend-title { color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-size: 0.65rem; }
    .legend-bar { width: 100%; height: 10px; border-radius: 3px; margin: 4px 0 2px; }
    .legend-labels { display: flex; justify-content: space-between; opacity: 0.6; font-size: 0.62rem; }

    /* ── Side panel ── */
    #panel {
      position: fixed; top: 48px; right: 0; width: 260px; bottom: 0;
      background: rgba(10, 22, 40, 0.98);
      border-left: 1px solid var(--border);
      overflow-y: auto; z-index: 900; padding: 12px 0;
      display: flex; flex-direction: column; gap: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -4px 0 24px rgba(0,0,0,0.5);
    }
    #panel.hidden { transform: translateX(100%); }

    @media (max-width: 768px) {
      #panel { width: 85vw; }
      #panel.hidden { transform: translateX(100%); }
    }
    #panel-title { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; padding: 0 14px 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

    .glider-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 4px; padding: 8px 14px; cursor: pointer; border-bottom: 1px solid rgba(26,58,110,0.4); transition: background 0.15s; }
    .glider-row:hover { background: rgba(0,212,255,0.07); }
    .glider-row.selected { background: rgba(0,212,255,0.13); border-left: 2px solid var(--accent); }
    .glider-reg { font-family: var(--mono); font-size: 0.82rem; color: #fff; letter-spacing: 0.06em; }
    .glider-reg.anon { color: var(--text); opacity: 0.5; font-style: italic; }
    .glider-alt { font-family: var(--mono); font-size: 0.7rem; color: var(--neutral); text-align: right; }
    .glider-stats { font-size: 0.68rem; color: var(--text); opacity: 0.55; grid-column: 1 / -1; }
    .climb-bar { grid-column: 1 / -1; height: 2px; border-radius: 1px; margin-top: 2px; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper { background: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; box-shadow: 0 4px 24px rgba(0,0,0,0.6) !important; color: var(--text) !important; font-family: var(--sans) !important; }
    .leaflet-popup-tip { background: var(--panel) !important; }
    .leaflet-popup-close-button { color: var(--accent) !important; }
    .popup-reg { font-family: var(--mono); font-size: 1rem; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.08em; }
    .popup-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; font-size: 0.8rem; }
    .popup-label { color: var(--text); opacity: 0.55; }
    .popup-value { font-family: var(--mono); color: #fff; }
    .popup-climb { color: var(--climb); }
    .popup-sink  { color: var(--sink); }

    /* ── Toggle panel button ── */
    #toggle-panel {
      position: fixed; bottom: 20px; right: 20px; z-index: 1100;
      background: var(--accent); color: var(--sky); border: none;
      border-radius: 50%; width: 48px; height: 48px; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,212,255,0.4); transition: background 0.2s, right 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #toggle-panel:hover { background: #33dfff; }
    #toggle-panel.panel-open { right: 275px; }
    @media (max-width: 768px) { #toggle-panel.panel-open { right: calc(85vw + 12px); } }

    /* Overlay behind panel on mobile */
    #panel-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 899;
    }
    #panel-overlay.visible { display: block; }

    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Wind tooltip */
    .wind-tooltip {
      background: rgba(10,22,40,0.9) !important;
      border: 1px solid var(--border) !important;
      color: var(--accent) !important;
      font-family: var(--mono) !important;
      font-size: 0.7rem !important;
      border-radius: 4px !important;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="live-dot"></div>
  <h1>OGN <span>Live Gliders</span></h1>
  <span id="count-badge">0 gliders</span>
  <span id="status">Connecting…</span>
</div>

<div id="map"></div>
<div id="panel-overlay"></div>

<!-- Weather layer toggles -->
<div id="weather-controls">
  <div id="wx-header">
    <span id="wx-header-title">Overlays</span>
    <span id="wx-chevron">▼</span>
  </div>
  <div id="wx-body">
    <button class="wx-btn" id="satellite-btn">
      <span class="dot" style="background:#8bc34a"></span>Satellite View
    </button>
    <div style="height:1px;background:var(--border);margin:0"></div>
    <button class="wx-btn" data-layer="clouds_new">
      <span class="dot" style="background:#aad4f5"></span>Cloud Cover
    </button>
    <button class="wx-btn" data-layer="precipitation_new">
      <span class="dot" style="background:#5599ff"></span>Precipitation
    </button>
    <button class="wx-btn" data-layer="wind_new">
      <span class="dot" style="background:#ffe066"></span>Wind Speed
    </button>
    <button class="wx-btn" id="wind-arrows-btn">
      <span class="dot" style="background:#ffffff"></span>Wind Arrows
    </button>
    <button class="wx-btn" data-layer="temp_new">
      <span class="dot" style="background:#ff6b6b"></span>Temperature
    </button>
    <button class="wx-btn" data-layer="pressure_new">
      <span class="dot" style="background:#b388ff"></span>Pressure
    </button>
    <div class="wx-opacity-row">
      <span>Opacity</span>
      <input type="range" id="wx-opacity" min="0.1" max="1" step="0.05" value="0.85" />
      <span id="wx-opacity-val">85%</span>
    </div>
  </div>
</div>

<!-- Legend -->
<div id="wx-legend">
  <div id="wx-legend-title">—</div>
  <div class="legend-bar" id="wx-legend-bar"></div>
  <div class="legend-labels" id="wx-legend-labels"></div>
</div>

<div id="panel">
  <div id="panel-title">Aircraft in view</div>
  <div id="glider-list"></div>
</div>

<button id="toggle-panel" title="Toggle panel">☰</button>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const OGN_PROXY_URL = '/ogn-proxy';    // Cloudflare Pages Function
const WX_TILE_BASE  = '/wx-tile';      // Cloudflare Pages Function (catch-all)
const POLL_INTERVAL_MS = 3000;

// Restrict OGN data to Australia
const BOUNDS_LIMIT = {
  latMin: -48, latMax: -8,
  lngMin: 108, lngMax: 162,
};

// ─────────────────────────────────────────────
// MAP SETUP
// ─────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([-33.28488982887025, 151.21324330464512], 9, {
  maxBounds: [[-48, 108], [-8, 162]],
  maxBoundsViscosity: 1.0,
});
map.setMaxBounds([[-48, 108], [-8, 162]]);

L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Base map layers
const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> | OGN | OpenWeatherMap',
  maxZoom: 18,
});

const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri, Maxar, Earthstar Geographics',
  maxZoom: 19,
});

streetLayer.addTo(map);
let satelliteActive = false;

// Central Coast Soaring Club marker
L.marker([-33.28488982887025, 151.21324330464512], {
  icon: L.divIcon({
    html: `<div style="
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: #ffffff;
      background: rgba(0, 80, 160, 0.92);
      border: 1px solid #00d4ff;
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
      transform: translateX(-50%);
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      font-weight: bold;
      letter-spacing: 0.05em;
    ">✈ Central Coast Soaring Club</div>`,
    className: '',
    iconAnchor: [0, 0],
  }),
  interactive: false,
  zIndexOffset: -1000,
}).addTo(map);

// Hunter Valley Gliding Club marker
L.marker([-32.54856887072558, 151.023106754768], {
  icon: L.divIcon({
    html: `<div style="
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: #ffffff;
      background: rgba(0, 80, 160, 0.92);
      border: 1px solid #00d4ff;
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
      transform: translateX(-50%);
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      font-weight: bold;
      letter-spacing: 0.05em;
    ">✈ Hunter Valley Gliding Club</div>`,
    className: '',
    iconAnchor: [0, 0],
  }),
  interactive: false,
  zIndexOffset: -1000,
}).addTo(map);

// Lake Keepit Gliding Club marker
L.marker([-30.854946531043954, 150.50235795027774], {
  icon: L.divIcon({
    html: `<div style="
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: #ffffff;
      background: rgba(0, 80, 160, 0.92);
      border: 1px solid #00d4ff;
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
      transform: translateX(-50%);
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      font-weight: bold;
      letter-spacing: 0.05em;
    ">✈ Lake Keepit Gliding Club</div>`,
    className: '',
    iconAnchor: [0, 0],
  }),
  interactive: false,
  zIndexOffset: -1000,
}).addTo(map);

// ─────────────────────────────────────────────
// WEATHER LAYERS
// ─────────────────────────────────────────────
const LAYER_META = {
  clouds_new:        { label: 'Cloud Cover',    gradient: 'linear-gradient(to right,rgba(255,255,255,0),rgba(180,210,255,0.7),rgba(80,130,255,1))',          min: '0%',    max: '100%' },
  precipitation_new: { label: 'Precipitation',  gradient: 'linear-gradient(to right,rgba(0,100,255,0),rgba(0,160,255,0.7),rgba(0,255,200,1))',               min: '0',     max: '140 mm/h' },
  wind_new:          { label: 'Wind Speed',      gradient: 'linear-gradient(to right,#1a1a6e,#0066ff,#00ccff,#ffff00,#ff6600,#cc0000)',                       min: '0 m/s', max: '100 m/s' },
  temp_new:          { label: 'Temperature',     gradient: 'linear-gradient(to right,#821692,#0000ff,#00bfff,#00ff00,#ffff00,#ff6600,#ff0000)',               min: '-40°C', max: '+40°C' },
  pressure_new:      { label: 'Pressure',        gradient: 'linear-gradient(to right,#00008b,#0000ff,#00bfff,#7fff00,#ffff00,#ff6600,#ff0000)',               min: '950 hPa', max: '1070 hPa' },
};

// Multi-layer support — each layer has its own Leaflet tile layer instance
const activeLayers = {}; // layerName → L.tileLayer
let weatherOpacity = 0.85;

function toggleWeather(btn) {
  const layer = btn.dataset.layer;

  if (activeLayers[layer]) {
    // Toggle OFF
    map.removeLayer(activeLayers[layer]);
    delete activeLayers[layer];
    btn.classList.remove('active');
    updateLegend();
    return;
  }

  // Toggle ON — add this layer on top
  const tileLayer = L.tileLayer(
    `${WX_TILE_BASE}/{z}/{x}/{y}?layer=${layer}`,
    { opacity: weatherOpacity, maxZoom: 18, className: 'weather-layer', zIndex: 500 }
  ).addTo(map);

  activeLayers[layer] = tileLayer;
  btn.classList.add('active');
  updateLegend();
}

// Show legend for the most recently activated layer
function updateLegend() {
  const activeKeys = Object.keys(activeLayers);
  if (activeKeys.length === 0) {
    document.getElementById('wx-legend').classList.remove('visible');
    return;
  }
  // Show legend for last active layer
  const last = activeKeys[activeKeys.length - 1];
  const meta = LAYER_META[last];
  document.getElementById('wx-legend-title').textContent    = meta.label;
  document.getElementById('wx-legend-bar').style.background = meta.gradient;
  document.getElementById('wx-legend-labels').innerHTML     = `<span>${meta.min}</span><span>${meta.max}</span>`;
  document.getElementById('wx-legend').classList.add('visible');
}

// Opacity slider
document.getElementById('wx-opacity').addEventListener('input', function() {
  weatherOpacity = parseFloat(this.value);
  document.getElementById('wx-opacity-val').textContent = Math.round(weatherOpacity * 100) + '%';
  Object.values(activeLayers).forEach(l => l.setOpacity(weatherOpacity));
});

// Wire up weather buttons
document.querySelectorAll('.wx-btn').forEach(btn => {
  btn.addEventListener('click', () => toggleWeather(btn));
});

// Collapsible overlays panel
const wxHeader  = document.getElementById('wx-header');
const wxBody    = document.getElementById('wx-body');
const wxChevron = document.getElementById('wx-chevron');

// Start collapsed on mobile
if (window.innerWidth <= 768) {
  wxBody.classList.add('collapsed');
  wxChevron.classList.add('collapsed');
}

wxHeader.addEventListener('click', () => {
  wxBody.classList.toggle('collapsed');
  wxChevron.classList.toggle('collapsed');
});

// Satellite toggle
document.getElementById('satellite-btn').addEventListener('click', function() {
  satelliteActive = !satelliteActive;
  this.classList.toggle('active', satelliteActive);
  if (satelliteActive) {
    map.removeLayer(streetLayer);
    satelliteLayer.addTo(map);
    satelliteLayer.bringToBack();
    map.getContainer().classList.add('satellite-mode');
    // Satellite is bright — reduce weather overlay filter for better contrast
    document.querySelectorAll('.weather-layer .leaflet-tile').forEach(t => {
      t.style.mixBlendMode = 'multiply';
    });
  } else {
    map.removeLayer(satelliteLayer);
    streetLayer.addTo(map);
    streetLayer.bringToBack();
    map.getContainer().classList.remove('satellite-mode');
    document.querySelectorAll('.weather-layer .leaflet-tile').forEach(t => {
      t.style.mixBlendMode = '';
    });
  }
});

// ─────────────────────────────────────────────
// GLIDER ICON
// ─────────────────────────────────────────────
function gliderIcon(heading, climbRate, registration) {
  const color = climbRate > 0.3 ? '#00cc44' : climbRate < -0.3 ? '#ff4d6d' : '#ffaa00';
  const label = registration && registration !== '(anon)' ? registration : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <g transform="rotate(${heading}, 20, 20)">
      <ellipse cx="20" cy="20" rx="2.2" ry="11" fill="${color}" opacity="0.95"/>
      <ellipse cx="20" cy="10" rx="1.2" ry="3" fill="${color}" opacity="0.95"/>
      <path d="M20,19 Q12,17 2,20 Q12,22 20,21 Z" fill="${color}" opacity="0.88"/>
      <path d="M20,19 Q28,17 38,20 Q28,22 20,21 Z" fill="${color}" opacity="0.88"/>
      <path d="M20,29 Q16,28 13,30 Q16,31 20,30 Z" fill="${color}" opacity="0.8"/>
      <path d="M20,29 Q24,28 27,30 Q24,31 20,30 Z" fill="${color}" opacity="0.8"/>
      <path d="M20,27 L20,31" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </svg>
  ${label ? `<div style="
    position:absolute; top:42px; left:50%; transform:translateX(-50%);
    font-family:'Share Tech Mono',monospace; font-size:0.65rem;
    color:#fff; background:rgba(0,0,0,0.65);
    padding:1px 5px; border-radius:3px; white-space:nowrap;
    border:1px solid ${color}; letter-spacing:0.05em;
  ">${label}</div>` : ''}`;
  return L.divIcon({
    html: `<div style="position:relative;width:40px;height:40px">${svg}</div>`,
    className: '',
    iconSize: [40, 40],
    iconAnchor: [20, 20],
  });
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const markers    = {};
const trails     = {}; // deviceId → L.polyline
const trailData  = {}; // deviceId → [{lat,lng,t}, ...]
let gliderData   = {};
let selectedId   = null;
const altHistory   = {}; // deviceId → [{t, alt}, ...] for rolling vario calc
const posHistory   = {}; // deviceId → [{lat, lng, t}, ...] for speed calc

// ─────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────
function buildPopup(g, extraHtml) {
  const climbClass = g.climbRate > 0 ? 'popup-climb' : g.climbRate < 0 ? 'popup-sink' : '';
  const climbStr   = (g.climbRate >= 0 ? '+' : '') + g.climbRate.toFixed(1) + ' m/s';
  return `
    <div class="popup-reg">${g.registration}</div>
    <div class="popup-grid">
      ${extraHtml}
      <span class="popup-label">Altitude</span>
      <span class="popup-value">${g.altitudeM.toLocaleString()} m (${g.altitudeFt.toLocaleString()} ft)</span>
      <span class="popup-label">Speed</span>
      <span class="popup-value">${g.speedKmh} km/h</span>
      <span class="popup-label">Heading</span>
      <span class="popup-value">${g.heading}°</span>
      <span class="popup-label">Vario</span>
      <span class="popup-value ${climbClass}">${climbStr}</span>
      <span class="popup-label">Last seen</span>
      <span class="popup-value">${g.timeUtc} UTC</span>
      <span class="popup-label">Receiver</span>
      <span class="popup-value">${g.receiver || '—'}</span>
      <span class="popup-label">Device ID</span>
      <span class="popup-value">${g.deviceId || '—'}</span>
    </div>`;
}

// ─────────────────────────────────────────────
// MAP UPDATE
// ─────────────────────────────────────────────
function updateMap(gliders) {
  const seen = new Set();
  gliders.forEach(g => {
    const id = g.deviceId || (g.lat + ',' + g.lng);
    seen.add(id);
    const now = Date.now();

    // Rolling vario — 30s altitude history
    if (!altHistory[id]) altHistory[id] = [];
    altHistory[id].push({ t: now, alt: g.altitudeM });
    altHistory[id] = altHistory[id].filter(e => now - e.t <= 30000);
    if (altHistory[id].length >= 2) {
      const oldest = altHistory[id][0];
      const newest = altHistory[id][altHistory[id].length - 1];
      const dtSec  = (newest.t - oldest.t) / 1000;
      if (dtSec > 0) g.climbRate = parseFloat(((newest.alt - oldest.alt) / dtSec).toFixed(1));
    }

    // Rolling ground speed — calculated from GPS position changes over 30s
    if (!posHistory[id]) posHistory[id] = [];
    posHistory[id].push({ t: now, lat: g.lat, lng: g.lng });
    posHistory[id] = posHistory[id].filter(e => now - e.t <= 30000);
    if (posHistory[id].length >= 2) {
      const oldest = posHistory[id][0];
      const newest = posHistory[id][posHistory[id].length - 1];
      const dtSec  = (newest.t - oldest.t) / 1000;
      if (dtSec > 1) {
        // Haversine distance in km
        const R    = 6371;
        const dLat = (newest.lat - oldest.lat) * Math.PI / 180;
        const dLng = (newest.lng - oldest.lng) * Math.PI / 180;
        const a    = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(oldest.lat * Math.PI/180) * Math.cos(newest.lat * Math.PI/180) *
                     Math.sin(dLng/2) * Math.sin(dLng/2);
        const distKm = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const calcSpeedKmh = Math.round((distKm / dtSec) * 3600);
        // Only use calculated speed if it seems reasonable (10–350 km/h)
        // and is higher than raw OGN value (OGN often under-reports)
        if (calcSpeedKmh >= 10 && calcSpeedKmh <= 350) {
          g.speedKmh = calcSpeedKmh;
        }
      }
    }
    gliderData[id] = g;

    // Update trail
    if (!trailData[id]) trailData[id] = [];
    const last = trailData[id][trailData[id].length - 1];
    if (!last || last.lat !== g.lat || last.lng !== g.lng) {
      trailData[id].push({ lat: g.lat, lng: g.lng, t: Date.now() });
      // Keep last 10 minutes of trail
      const cutoff = Date.now() - 10 * 60 * 1000;
      trailData[id] = trailData[id].filter(p => p.t > cutoff);
    }
    const trailColor = g.climbRate > 0.3 ? '#00cc44' : g.climbRate < -0.3 ? '#ff4d6d' : '#ffaa00';
    const latlngs = trailData[id].map(p => [p.lat, p.lng]);
    if (trails[id]) {
      trails[id].setLatLngs(latlngs);
      trails[id].setStyle({ color: trailColor });
    } else {
      trails[id] = L.polyline(latlngs, {
        color: trailColor, weight: 2, opacity: 0.7,
        dashArray: '4 4', smoothFactor: 1,
      }).addTo(map);
    }

    // Update marker
    if (markers[id]) {
      markers[id].setLatLng([g.lat, g.lng]);
      markers[id].setIcon(gliderIcon(g.heading, g.climbRate, g.registration));
      // Only update open popup with live flight data, never reset to Loading
      if (markers[id].isPopupOpen()) {
        const cached = markers[id]._ognExtra || '';
        markers[id].setPopupContent(buildPopup(g, cached));
      }
    } else {
      const m = L.marker([g.lat, g.lng], { icon: gliderIcon(g.heading, g.climbRate, g.registration) })
        .bindPopup(buildPopup(g, ''), { maxWidth: 280 })
        .addTo(map);
      m.on('click', async () => {
        selectGlider(id);
        // Fetch extra data once and cache on the marker
        if (!m._ognExtra) {
          try {
            const res   = g.deviceId ? await fetch(`/glider-info?id=${encodeURIComponent(g.deviceId)}`) : null;
            const match = res && res.ok ? await res.json() : null;
            if (match) {
              m._ognExtra = `
                <span class="popup-label">Registration</span>
                <span class="popup-value">${match.registration || '—'}</span>
                <span class="popup-label">Model</span>
                <span class="popup-value">${match.aircraft_model || '—'}</span>
                <span class="popup-label">Type</span>
                <span class="popup-value">${match.aircraft_type || '—'}</span>
                <span class="popup-label">CN</span>
                <span class="popup-value">${match.cn || '—'}</span>`;
            } else {
              m._ognExtra = '';
            }
          } catch(e) { m._ognExtra = ''; }
        }
        m.setPopupContent(buildPopup(gliderData[id] || g, m._ognExtra));
      });
      markers[id] = m;
    }
  });
  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) {
      markers[id].remove(); delete markers[id]; delete gliderData[id];
      if (trails[id])      { trails[id].remove();  delete trails[id];   delete trailData[id]; }
      if (posHistory[id])  { delete posHistory[id]; }
      if (altHistory[id])  { delete altHistory[id]; }
    }
  });
  updatePanel(gliders);
}

// ─────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────
function updatePanel(gliders) {
  const list   = document.getElementById('glider-list');
  const sorted = [...gliders].sort((a, b) => b.altitudeM - a.altitudeM);
  list.innerHTML = sorted.map(g => {
    const id         = g.deviceId || (g.lat + ',' + g.lng);
    const climbColor = g.climbRate > 0.3 ? '#00ff88' : g.climbRate < -0.3 ? '#ff4d6d' : '#ffd700';
    const climbWidth = Math.min(Math.abs(g.climbRate) * 20, 100);
    const isSelected = id === selectedId;
    return `
      <div class="glider-row${isSelected ? ' selected' : ''}" onclick="selectGlider('${id}')">
        <span class="glider-reg${g.isAnonymous ? ' anon' : ''}">${g.registration}</span>
        <span class="glider-alt">${g.altitudeM.toLocaleString()}m</span>
        <span class="glider-stats">${g.speedKmh} km/h · ${g.heading}° · ${g.climbRate >= 0 ? '+' : ''}${g.climbRate.toFixed(1)} m/s</span>
        <div class="climb-bar" style="background:${climbColor};width:${climbWidth}%;opacity:0.6"></div>
      </div>`;
  }).join('');
}

function selectGlider(id) {
  selectedId = id;
  const g = gliderData[id];
  if (!g) return;
  map.setView([g.lat, g.lng], Math.max(map.getZoom(), 10), { animate: true });
  if (markers[id]) markers[id].openPopup();
  updatePanel(Object.values(gliderData));
}
window.selectGlider = selectGlider;

// ─────────────────────────────────────────────
// OGN POLLING
// ─────────────────────────────────────────────
async function fetchGliders() {
  const bounds = map.getBounds();
  const params = new URLSearchParams({
    latMin: Math.max(bounds.getSouth(), BOUNDS_LIMIT.latMin).toFixed(4),
    latMax: Math.min(bounds.getNorth(), BOUNDS_LIMIT.latMax).toFixed(4),
    lngMin: Math.max(bounds.getWest(),  BOUNDS_LIMIT.lngMin).toFixed(4),
    lngMax: Math.min(bounds.getEast(),  BOUNDS_LIMIT.lngMax).toFixed(4),
  });
  try {
    const res  = await fetch(`${OGN_PROXY_URL}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    updateMap(data.gliders || []);
    document.getElementById('live-dot').classList.remove('error');
    document.getElementById('count-badge').textContent = `${data.count} gliders`;
    document.getElementById('status').textContent = `Updated ${new Date(data.fetchedAt).toLocaleTimeString()}`;
  } catch (err) {
    document.getElementById('live-dot').classList.add('error');
    document.getElementById('status').textContent = `Error: ${err.message}`;
  }
}

fetchGliders();
setInterval(fetchGliders, POLL_INTERVAL_MS);
map.on('moveend', () => { clearTimeout(map._ognFetchTimer); map._ognFetchTimer = setTimeout(fetchGliders, 600); });

// ─────────────────────────────────────────────
// WIND ARROWS
// ─────────────────────────────────────────────
let windArrowsActive = false;
let windArrowLayer   = null;
let windArrowTimer   = null;

document.getElementById('wind-arrows-btn').addEventListener('click', function() {
  windArrowsActive = !windArrowsActive;
  this.classList.toggle('active', windArrowsActive);
  if (windArrowsActive) {
    fetchWindArrows();
    windArrowTimer = setInterval(fetchWindArrows, 300000); // refresh every 5 min
    map.on('moveend', fetchWindArrows);
  } else {
    if (windArrowLayer) { map.removeLayer(windArrowLayer); windArrowLayer = null; }
    clearInterval(windArrowTimer);
    map.off('moveend', fetchWindArrows);
  }
});

async function fetchWindArrows() {
  if (!windArrowsActive) return;

  const zoom  = map.getZoom();
  const steps = zoom < 6 ? 3 : zoom < 8 ? 4 : zoom < 10 ? 5 : 6;

  const bounds  = map.getBounds();
  const latSpan = bounds.getNorth() - bounds.getSouth();
  const lngSpan = bounds.getEast()  - bounds.getWest();

  // Oversample by 40% to cover header/panel offsets
  const south = bounds.getSouth() - latSpan * 0.4;
  const north = bounds.getNorth() + latSpan * 0.4;
  const west  = bounds.getWest()  - lngSpan * 0.4;
  const east  = bounds.getEast()  + lngSpan * 0.4;

  const latStep = (north - south) / steps;
  const lngStep = (east  - west)  / steps;

  const points = [];
  for (let i = 0; i <= steps; i++) {
    for (let j = 0; j <= steps; j++) {
      points.push({
        lat: south + i * latStep,
        lng: west  + j * lngStep,
      });
    }
  }

  // Fetch all points in parallel — each has its own 4s timeout
  const results = await Promise.all(points.map(async p => {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 4000);
      const res = await fetch(`/wind-data?lat=${p.lat.toFixed(2)}&lon=${p.lng.toFixed(2)}`, { signal: controller.signal });
      clearTimeout(tid);
      if (!res.ok) return null;
      const d = await res.json();
      return { lat: p.lat, lng: p.lng, speed: d.speed, deg: d.deg };
    } catch { return null; }
  }));

  // Remove old layer
  if (windArrowLayer) { map.removeLayer(windArrowLayer); windArrowLayer = null; }

  const arrowMarkers = results.filter(Boolean).map(w => {
    const speedKmh = Math.round(w.speed * 3.6);
    const color = w.speed < 3 ? '#00ff88' : w.speed < 8 ? '#ffd700' : w.speed < 15 ? '#ff8c00' : '#ff4d6d';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
      <g transform="rotate(${(w.deg + 180) % 360}, 16, 16)">
        <line x1="16" y1="26" x2="16" y2="8" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
        <polygon points="16,4 11,12 21,12" fill="${color}"/>
      </g>
    </svg>`;
    return L.marker([w.lat, w.lng], {
      icon: L.divIcon({ html: svg, className: '', iconSize: [32, 32], iconAnchor: [16, 16] }),
      interactive: true,
      zIndexOffset: 200,
    }).bindTooltip(`${speedKmh} km/h · ${w.deg}°`, { permanent: false, className: 'wind-tooltip' });
  });

  windArrowLayer = L.layerGroup(arrowMarkers).addTo(map);
}

const panelEl   = document.getElementById('panel');
const toggleBtn = document.getElementById('toggle-panel');
const overlayEl = document.getElementById('panel-overlay');

function isMobile() { return window.innerWidth <= 768; }

function openPanel() {
  panelEl.classList.remove('hidden');
  toggleBtn.classList.add('panel-open');
  toggleBtn.textContent = '✕';
  if (isMobile()) overlayEl.classList.add('visible');
}

function closePanel() {
  panelEl.classList.add('hidden');
  toggleBtn.classList.remove('panel-open');
  toggleBtn.textContent = '☰';
  overlayEl.classList.remove('visible');
}

function togglePanel() {
  panelEl.classList.contains('hidden') ? openPanel() : closePanel();
}

// On mobile start with panel hidden, desktop start open
if (isMobile()) {
  closePanel();
} else {
  openPanel();
}

toggleBtn.addEventListener('click', togglePanel);
overlayEl.addEventListener('click', closePanel);

// Close panel on mobile when a glider is selected
const _selectGlider = selectGlider;
window.selectGlider = function(id) {
  _selectGlider(id);
  if (isMobile()) closePanel();
};
</script>
</body>
